<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb9060"/>
      <stop offset="44%" style="stop-color:#f05928"/>
      <stop offset="100%" style="stop-color:#e53e16"/>
    </linearGradient>
    <linearGradient id="icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb9060"/>
      <stop offset="100%" style="stop-color:#f05928"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="-80" r="340" fill="rgba(255,255,255,0.05)"/>
  <circle cx="150" cy="720" r="240" fill="rgba(255,255,255,0.03)"/>

  <!-- Icon badge -->
  <rect x="80" y="200" width="80" height="80" rx="20" fill="rgba(255,255,255,0.15)"/>
  <circle cx="120" cy="235" r="16" stroke="white" stroke-width="3" fill="none"/>
  <line x1="131" y1="246" x2="143" y2="258" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Main text -->
  <text x="80" y="340" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="72" font-weight="400" fill="white" letter-spacing="4">メニューを、</text>
  <text x="80" y="430" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="72" font-weight="400" fill="rgba(255,255,255,0.7)" letter-spacing="4">あなたの言葉で。</text>

  <!-- English tagline -->
  <text x="80" y="490" font-family="Georgia, serif" font-size="24" font-style="italic" fill="rgba(255,255,255,0.45)" letter-spacing="2">Every menu, in your language.</text>

  <!-- App name -->
  <text x="80" y="570" font-family="Hiragino Mincho ProN, Yu Mincho, serif" font-size="28" font-weight="500" fill="rgba(255,255,255,0.6)" letter-spacing="8">MENUFY</text>

  <!-- Right side stats -->
  <rect x="820" y="220" width="160" height="60" rx="12" fill="rgba(255,255,255,0.15)"/>
  <text x="900" y="258" font-family="Hiragino Kaku Gothic ProN, sans-serif" font-size="18" fill="white" text-anchor="middle" letter-spacing="1">14言語対応</text>

  <rect x="1000" y="220" width="160" height="60" rx="12" fill="rgba(255,255,255,0.15)"/>
  <text x="1080" y="258" font-family="Hiragino Kaku Gothic ProN, sans-serif" font-size="18" fill="white" text-anchor="middle" letter-spacing="1">買い切り制</text>

  <rect x="820" y="300" width="340" height="60" rx="12" fill="rgba(255,255,255,0.15)"/>
  <text x="990" y="338" font-family="Hiragino Kaku Gothic ProN, sans-serif" font-size="18" fill="white" text-anchor="middle" letter-spacing="1">為替換算リアルタイム表示</text>

  <!-- App Store badge -->
  <rect x="820" y="400" width="340" height="70" rx="14" fill="white"/>
  <text x="990" y="442" font-family="Hiragino Mincho ProN, serif" font-size="22" font-weight="500" fill="#17110b" text-anchor="middle" letter-spacing="2">App Storeで入手</text>
  <text x="990" y="462" font-family="Hiragino Kaku Gothic ProN, sans-serif" font-size="13" fill="#90847d" text-anchor="middle" letter-spacing="1">まず5回、体験できます</text>
</svg>
